name: Flask CI/CD to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t adity0305/lib-app:latest .

      # 3. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Push Docker Image
      - name: Push Docker Image
        run: |
          docker push adity0305/lib-app:latest

      # 5. Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull adity0305/lib-app:latest
            
            docker stop lib-app || true
            docker rm lib-app || true
            
            docker run -d -p 80:5000 --name lib-app adity0305/lib-app:latest