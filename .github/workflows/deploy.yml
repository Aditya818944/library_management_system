name: Flask CI/CD to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: |
          docker build -t aditya0305/lib-app:latest .

      - name: Login to DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u aditya0305 --password-stdin

      - name: Push Docker Image
        run: |
          docker push aditya0305/lib-app:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull aditya0305/lib-app:latest
            
            docker stop flask-app || true
            docker rm flask-app || true
            
            docker run -d -p 80:5000 --name flask-app aditya0305/lib-app:latest