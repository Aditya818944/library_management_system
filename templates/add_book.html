{% extends 'base.html' %}
{% block content %}
<h4 class="mb-4 fw-bold" style="color:#1a237e"><i class="bi bi-plus-circle me-2"></i>Add Book</h4>
<div class="card">
  <div class="card-header">Add New Book / Movie</div>
  <div class="card-body">
    <form method="POST">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">Type <span class="text-danger">*</span></label>
          <select name="type" class="form-select">
            <option value="book" selected>Book</option>
            <option value="movie">Movie</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Serial Number <span class="text-danger">*</span></label>
          <input type="text" name="serial_no" class="form-control" placeholder="e.g. BK003" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
          <input type="text" name="title" class="form-control" placeholder="Enter book/movie title" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Author / Director <span class="text-danger">*</span></label>
          <input type="text" name="author" class="form-control" placeholder="Enter author or director name" required>
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary px-4"><i class="bi bi-plus-circle me-2"></i>Add Book</button>
          <a href="/dashboard" class="btn btn-outline-secondary ms-2">Cancel</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
